<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import { Upload, Download, Type, Image as ImageIcon, Settings, Palette, Type as TypeIcon, BookmarkPlus, List, X, Share2, Library, Trash2, Loader2, CheckCircle2, Lock } from 'lucide-react';

// Firebase（公式CDNから読み込み）
import { initializeApp } from 'https://esm.sh/firebase@10.12.0/app';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://esm.sh/firebase@10.12.0/auth';
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'https://esm.sh/firebase@10.12.0/firestore';

// ==========================================
// Firebase 初期化
// ==========================================
let app, auth, db;
const appId = window.APP_ID || 'default-app-id';
try {
  const cfg = window.FIREBASE_CONFIG;
  if (cfg && cfg.apiKey && !cfg.apiKey.startsWith('ここに')) {
    app = initializeApp(cfg);
    auth = getAuth(app);
    db = getFirestore(app);
  }
} catch (e) {
  console.error("Firebase init error", e);
}

const PRESET_BGS = [
  '#ffffff', '#f8fafc', '#e2e8f0',
  '#ffedd5', '#fce7f3', '#e0f2fe', '#dcfce7',
  '#1e3a8a', '#0f172a', '#881337', '#14532d'
];

const PRESET_TEXTS = [
  '#000000', '#1e293b', '#334155',
  '#1e3a8a', '#0369a1', '#831843',
  '#ffffff', '#f8fafc'
];

// ==========================================
// 合言葉ロック画面
// ==========================================
function PassphraseGate({ onUnlock }) {
  const [input, setInput] = useState('');
  const [error, setError] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (input === window.APP_PASSPHRASE) {
      localStorage.setItem('meo_unlocked', '1');
      onUnlock();
    } else {
      setError(true);
    }
  };

  return (
    <div className="flex items-center justify-center h-screen bg-slate-100 p-6">
      <form onSubmit={handleSubmit} className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm space-y-6">
        <div className="flex flex-col items-center text-center space-y-3">
          <div className="bg-blue-600 p-3 rounded-2xl">
            <Lock className="text-white w-7 h-7" />
          </div>
          <h1 className="text-lg font-bold text-slate-800">あさばグループ専用ツール</h1>
          <p className="text-sm text-slate-500">合言葉を入力してください</p>
        </div>
        <input
          type="password"
          value={input}
          onChange={(e) => { setInput(e.target.value); setError(false); }}
          autoFocus
          className={`w-full p-3 border rounded-lg text-center outline-none focus:ring-2 focus:ring-blue-500 ${error ? 'border-red-400 bg-red-50' : 'border-slate-300'}`}
          placeholder="合言葉"
        />
        {error && <p className="text-sm text-red-500 text-center -mt-3">合言葉が違います</p>}
        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium transition-colors">
          開く
        </button>
      </form>
    </div>
  );
}

// ==========================================
// メインアプリ
// ==========================================
function ThumbnailApp() {
  const canvasRef = useRef(null);

  const [baseImage, setBaseImage] = useState(null);
  const [titleText, setTitleText] = useState("梅雨の気圧変動による\n頭痛やめまいをスッキリ整える！");
  const [isHeaderVisible, setIsHeaderVisible] = useState(true);

  const [titleHistory, setTitleHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem('meo_title_history')) || []; } catch(e) { return []; }
  });
  const [savedTitles, setSavedTitles] = useState(() => {
    try { return JSON.parse(localStorage.getItem('meo_saved_titles')) || []; } catch(e) { return []; }
  });

  const [isHeaderFixed, setIsHeaderFixed] = useState(true);

  const [canvasWidth, setCanvasWidth] = useState(1200);
  const [canvasHeight, setCanvasHeight] = useState(900);

  const [headerHeightRatio, setHeaderHeightRatio] = useState(20);
  const [fontSizeRatio, setFontSizeRatio] = useState(5.0);

  const [bgColor, setBgColor] = useState('#ffffff');
  const [textColor, setTextColor] = useState('#1e3a8a');

  const [user, setUser] = useState(null);
  const [galleryImages, setGalleryImages] = useState([]);
  const [showGallery, setShowGallery] = useState(false);
  const [isUploading, setIsUploading] = useState(false);
  const [toastMsg, setToastMsg] = useState('');

  const showToast = (msg) => {
    setToastMsg(msg);
    setTimeout(() => setToastMsg(''), 3000);
  };

  // 認証
  useEffect(() => {
    if (!auth) return;
    signInAnonymously(auth).catch((error) => console.error("Auth error", error));
    const unsubscribe = onAuthStateChanged(auth, setUser);
    return () => unsubscribe();
  }, []);

  // ギャラリー監視
  useEffect(() => {
    if (!user || !db) return;
    const thumbnailsRef = collection(db, 'artifacts', appId, 'public', 'data', 'shared_thumbnails');
    const unsubscribe = onSnapshot(thumbnailsRef, (snapshot) => {
      const items = [];
      snapshot.forEach((d) => { items.push({ id: d.id, ...d.data() }); });
      items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      setGalleryImages(items);
    }, (error) => { console.error("Fetch error", error); });
    return () => unsubscribe();
  }, [user]);

  useEffect(() => {
    localStorage.setItem('meo_title_history', JSON.stringify(titleHistory));
  }, [titleHistory]);

  useEffect(() => {
    localStorage.setItem('meo_saved_titles', JSON.stringify(savedTitles));
  }, [savedTitles]);

  useEffect(() => {
    if (isHeaderFixed) setHeaderHeightRatio(20);
  }, [isHeaderFixed]);

  const addToHistory = (text) => {
    if (!text.trim()) return;
    setTitleHistory(prev => [text, ...prev.filter(t => t !== text)].slice(0, 10));
  };

  const saveTitle = () => {
    if (!titleText.trim()) return;
    if (savedTitles.includes(titleText)) return;
    setSavedTitles(prev => [titleText, ...prev]);
  };

  const removeSavedTitle = (text) => {
    setSavedTitles(prev => prev.filter(t => t !== text));
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => { setBaseImage(event.target.result); };
      reader.readAsDataURL(file);
    }
  };

  // Canvas描画
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
    ctx.fillStyle = '#f1f5f9';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);

    const drawTextAndBg = () => {
      if (!isHeaderVisible) return;
      const headerH = canvasHeight * (headerHeightRatio / 100);
      const rectY = canvasHeight - headerH;
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, rectY, canvasWidth, headerH);

      if (titleText) {
        const fSize = canvasHeight * (fontSizeRatio / 100);
        ctx.font = `bold ${fSize}px "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif`;
        ctx.fillStyle = textColor;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const lineHeight = fSize * 1.5;
        const padding = fSize * 1.2;
        const maxWidth = canvasWidth - (padding * 2);

        const lines = [];
        const paragraphs = titleText.split('\n');
        for (const p of paragraphs) {
          let currentLine = '';
          const chars = Array.from(p);
          for (let i = 0; i < chars.length; i++) {
            const char = chars[i];
            const testLine = currentLine + char;
            const metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth && currentLine !== '') {
              lines.push(currentLine);
              currentLine = char;
            } else {
              currentLine = testLine;
            }
          }
          lines.push(currentLine);
        }

        const totalTextHeight = lines.length * lineHeight;
        let currentY = rectY + (headerH - totalTextHeight) / 2 + (lineHeight / 2);
        lines.forEach(line => {
          ctx.fillText(line, canvasWidth / 2, currentY);
          currentY += lineHeight;
        });
      }
    };

    if (baseImage) {
      const img = new Image();
      img.onload = () => {
        const imgRatio = img.width / img.height;
        const canvasRatio = canvasWidth / canvasHeight;
        let drawWidth, drawHeight, offsetX, offsetY;
        if (imgRatio > canvasRatio) {
          drawHeight = canvasHeight;
          drawWidth = img.width * (canvasHeight / img.height);
          offsetX = (canvasWidth - drawWidth) / 2;
          offsetY = 0;
        } else {
          drawWidth = canvasWidth;
          drawHeight = img.height * (canvasWidth / img.width);
          offsetX = 0;
          offsetY = (canvasHeight - drawHeight) / 2;
        }
        ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
        drawTextAndBg();
      };
      img.src = baseImage;
    } else {
      drawTextAndBg();
    }
  }, [baseImage, titleText, canvasWidth, canvasHeight, headerHeightRatio, fontSizeRatio, bgColor, textColor, isHeaderVisible]);

  const handleDownload = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    addToHistory(titleText);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    downloadFromDataUrl(dataUrl, `meo_thumbnail_${canvasWidth}x${canvasHeight}.jpg`);
  };

  const downloadFromDataUrl = (dataUrl, filename) => {
    const link = document.createElement('a');
    link.download = filename;
    link.href = dataUrl;
    link.click();
  };

  const handleShareToGallery = async () => {
    if (!user || !db) {
      showToast("エラー：データベースに接続できません（Firebaseの設定を確認してください）");
      return;
    }
    const canvas = canvasRef.current;
    if (!canvas) return;
    setIsUploading(true);
    addToHistory(titleText);
    try {
      const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
      const thumbnailsRef = collection(db, 'artifacts', appId, 'public', 'data', 'shared_thumbnails');
      await addDoc(thumbnailsRef, {
        imageUrl: dataUrl,
        titleText: titleText,
        authorId: user.uid,
        createdAt: Date.now(),
        width: canvasWidth,
        height: canvasHeight
      });
      showToast("チームギャラリーに保存しました！");
    } catch (e) {
      console.error("Upload error", e);
      showToast("保存に失敗しました。画像データが大きすぎる可能性があります。");
    } finally {
      setIsUploading(false);
    }
  };

  const handleDeleteFromGallery = async (id) => {
    if (!db) return;
    try {
      await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shared_thumbnails', id));
      showToast("画像を削除しました");
    } catch (e) {
      console.error(e);
      showToast("削除に失敗しました");
    }
  };

  return (
    <div className="flex flex-col h-screen bg-slate-50 text-slate-800 font-sans">
      {toastMsg && (
        <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-[60] flex items-center space-x-2">
          <CheckCircle2 className="w-5 h-5 text-green-400" />
          <span className="font-medium">{toastMsg}</span>
        </div>
      )}

      <header className="bg-white border-b border-slate-200 px-4 md:px-6 py-4 flex flex-col md:flex-row md:justify-between items-center shrink-0 gap-4">
        <div className="flex items-center space-x-3 w-full md:w-auto">
          <div className="bg-blue-600 p-2 rounded-lg">
            <ImageIcon className="text-white w-5 h-5" />
          </div>
          <h1 className="text-lg md:text-xl font-bold text-slate-800 tracking-tight truncate">
            あさばグループ専用 サムネイル合成ツール
          </h1>
        </div>

        <div className="flex items-center space-x-2 w-full md:w-auto justify-end">
          <button onClick={() => setShowGallery(true)} className="flex items-center space-x-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 md:px-4 py-2.5 rounded-lg font-medium transition-colors shadow-sm text-sm">
            <Library className="w-4 h-4 text-blue-600" />
            <span className="hidden sm:inline">チームギャラリー</span>
          </button>
          <button onClick={handleShareToGallery} disabled={isUploading || !baseImage} className="flex items-center space-x-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white px-3 md:px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm text-sm">
            {isUploading ? <Loader2 className="w-4 h-4 animate-spin" /> : <Share2 className="w-4 h-4" />}
            <span className="hidden sm:inline">保存Boxへ共有</span>
            <span className="sm:hidden">共有</span>
          </button>
          <button onClick={handleDownload} className="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-3 md:px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm text-sm">
            <Download className="w-4 h-4" />
            <span className="hidden sm:inline">PCに保存</span>
            <span className="sm:hidden">DL</span>
          </button>
        </div>
      </header>

      <main className="flex-1 overflow-hidden flex flex-col md:flex-row relative">
        <div className="w-full md:w-[400px] bg-white border-r border-slate-200 overflow-y-auto shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10">
          <div className="p-6 space-y-8">

            <section className="space-y-4">
              <div className="flex items-center space-x-2 border-b pb-2">
                <ImageIcon className="w-5 h-5 text-blue-600" />
                <h2 className="text-lg font-semibold">1. ベース画像</h2>
              </div>
              <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors">
                <div className="flex flex-col items-center justify-center pt-5 pb-6">
                  <Upload className="w-8 h-8 mb-3 text-slate-400" />
                  <p className="mb-2 text-sm text-slate-500 font-medium">クリックして画像をアップロード</p>
                  <p className="text-xs text-slate-400">PNG, JPG, WEBP</p>
                </div>
                <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
              </label>
            </section>

            <section className="space-y-4">
              <div className="flex items-center justify-between border-b pb-2">
                <div className="flex items-center space-x-2">
                  <Type className="w-5 h-5 text-blue-600" />
                  <h2 className="text-lg font-semibold">2. タイトルテキスト</h2>
                </div>
                <label className="flex items-center cursor-pointer group" title="見出し帯の表示/非表示を切り替えます">
                  <span className="mr-2 text-sm font-medium text-slate-600 group-hover:text-slate-800 transition-colors">表示</span>
                  <div className="relative">
                    <input type="checkbox" className="sr-only" checked={isHeaderVisible} onChange={() => setIsHeaderVisible(!isHeaderVisible)} />
                    <div className={`block w-10 h-6 rounded-full transition-colors ${isHeaderVisible ? 'bg-blue-600' : 'bg-slate-300'}`}></div>
                    <div className={`absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${isHeaderVisible ? 'transform translate-x-4' : ''}`}></div>
                  </div>
                </label>
              </div>

              {titleHistory.length > 0 && (
                <div className="mb-2">
                  <select className="w-full p-2 text-sm border border-slate-300 rounded-lg bg-slate-50 outline-none focus:border-blue-500" onChange={(e) => { if(e.target.value) setTitleText(e.target.value); }} value="">
                    <option value="">過去の履歴から選択 (直近10件)</option>
                    {titleHistory.map((t, i) => (
                      <option key={i} value={t}>{t.replace(/\n/g, ' ')}</option>
                    ))}
                  </select>
                </div>
              )}

              <textarea value={titleText} onChange={(e) => setTitleText(e.target.value)} disabled={!isHeaderVisible}
                className={`w-full h-24 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none ${!isHeaderVisible ? 'bg-slate-50 text-slate-400 border-slate-200 cursor-not-allowed' : 'border-slate-300'}`}
                placeholder="画像に入れたいタイトルを入力してください" />

              <div className="flex justify-end">
                <button onClick={saveTitle} className="text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1.5 rounded font-medium flex items-center space-x-1 transition-colors">
                  <BookmarkPlus className="w-4 h-4" />
                  <span>リストに保存</span>
                </button>
              </div>
            </section>

            <section className="space-y-4">
              <div className="flex items-center space-x-2 border-b pb-2">
                <List className="w-5 h-5 text-blue-600" />
                <h2 className="text-lg font-semibold">保存済みリスト</h2>
              </div>
              {savedTitles.length === 0 ? (
                <p className="text-sm text-slate-500">保存されたタイトルはありません</p>
              ) : (
                <ul className="space-y-2 max-h-40 overflow-y-auto pr-1">
                  {savedTitles.map((t, i) => (
                    <li key={i} className="flex items-center justify-between p-2 bg-slate-50 border border-slate-200 rounded text-sm group transition-colors hover:bg-slate-100">
                      <span className="truncate flex-1 mr-2 cursor-pointer" onClick={() => setTitleText(t)}>{t.replace(/\n/g, ' ')}</span>
                      <button onClick={() => removeSavedTitle(t)} className="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                        <X className="w-4 h-4" />
                      </button>
                    </li>
                  ))}
                </ul>
              )}
            </section>

            <section className="space-y-4">
              <div className="flex items-center space-x-2 border-b pb-2">
                <Settings className="w-5 h-5 text-blue-600" />
                <h2 className="text-lg font-semibold">3. 画像サイズ（グローバル）</h2>
              </div>
              <div className="flex items-center space-x-4">
                <div className="flex-1">
                  <label className="block text-xs font-medium text-slate-500 mb-1">幅 (px)</label>
                  <input type="number" value={canvasWidth} onChange={(e) => setCanvasWidth(Number(e.target.value))} className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <div className="text-slate-400 font-bold mt-4">×</div>
                <div className="flex-1">
                  <label className="block text-xs font-medium text-slate-500 mb-1">高さ (px)</label>
                  <input type="number" value={canvasHeight} onChange={(e) => setCanvasHeight(Number(e.target.value))} className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
              </div>
              <div className="flex gap-2">
                <button onClick={() => {setCanvasWidth(1200); setCanvasHeight(900);}} className="text-xs bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-md font-medium">1200×900 (4:3)</button>
                <button onClick={() => {setCanvasWidth(1080); setCanvasHeight(1080);}} className="text-xs bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-md font-medium">1080×1080 (1:1)</button>
              </div>
            </section>

            <section className="space-y-5">
              <div className="flex items-center space-x-2 border-b pb-2">
                <TypeIcon className="w-5 h-5 text-blue-600" />
                <h2 className="text-lg font-semibold">4. デザイン調整</h2>
              </div>

              <div className="space-y-3">
                <div className="flex justify-between items-center">
                  <label className="text-sm font-medium text-slate-700">見出し帯の高さ</label>
                  <label className="flex items-center space-x-1.5 text-xs text-slate-600 cursor-pointer bg-slate-100 px-2 py-1 rounded-md">
                    <input type="checkbox" checked={isHeaderFixed} onChange={e => setIsHeaderFixed(e.target.checked)} className="rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-3 h-3 cursor-pointer" />
                    <span>20%に固定</span>
                  </label>
                </div>
                <div className="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-lg p-1.5">
                  <button disabled={isHeaderFixed || headerHeightRatio <= 10} onClick={() => setHeaderHeightRatio(prev => Math.max(10, prev - 1))} className="w-8 h-8 flex items-center justify-center bg-white rounded shadow-sm text-slate-600 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">-</button>
                  <span className={`font-bold ${isHeaderFixed ? 'text-slate-400' : 'text-blue-600'}`}>{headerHeightRatio}%</span>
                  <button disabled={isHeaderFixed || headerHeightRatio >= 50} onClick={() => setHeaderHeightRatio(prev => Math.min(50, prev + 1))} className="w-8 h-8 flex items-center justify-center bg-white rounded shadow-sm text-slate-600 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">+</button>
                </div>
              </div>

              <div className="space-y-3">
                <div className="flex justify-between items-center">
                  <label className="text-sm font-medium text-slate-700">文字の大きさ</label>
                </div>
                <div className="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-lg p-1.5">
                  <button disabled={fontSizeRatio <= 2} onClick={() => setFontSizeRatio(prev => Math.max(2, prev - 0.5))} className="w-8 h-8 flex items-center justify-center bg-white rounded shadow-sm text-slate-600 hover:bg-slate-100 disabled:opacity-50 transition-colors">-</button>
                  <span className="font-bold text-blue-600">{fontSizeRatio.toFixed(1)}%</span>
                  <button disabled={fontSizeRatio >= 15} onClick={() => setFontSizeRatio(prev => Math.min(15, prev + 0.5))} className="w-8 h-8 flex items-center justify-center bg-white rounded shadow-sm text-slate-600 hover:bg-slate-100 disabled:opacity-50 transition-colors">+</button>
                </div>
              </div>
            </section>

            <section className="space-y-6 pb-8">
              <div className="flex items-center space-x-2 border-b pb-2">
                <Palette className="w-5 h-5 text-blue-600" />
                <h2 className="text-lg font-semibold">5. カラー設定</h2>
              </div>

              <div className="space-y-3">
                <div className="flex items-center justify-between">
                  <label className="text-sm font-medium text-slate-700">見出し背景色</label>
                  <div className="flex items-center space-x-2">
                    <input type="text" value={bgColor} onChange={(e) => setBgColor(e.target.value)} className="w-20 p-1 text-sm border border-slate-300 rounded font-mono uppercase text-center outline-none focus:border-blue-500" />
                    <input type="color" value={bgColor} onChange={(e) => setBgColor(e.target.value)} className="w-7 h-7 p-0 border-0 rounded cursor-pointer" />
                  </div>
                </div>
                <div className="flex flex-wrap gap-2">
                  {PRESET_BGS.map(color => (
                    <button key={color} onClick={() => setBgColor(color)} className={`w-8 h-8 rounded-full border-2 transition-transform hover:scale-110 ${bgColor === color ? 'border-blue-500 shadow-md' : 'border-slate-200'}`} style={{ backgroundColor: color }} title={color} />
                  ))}
                </div>
              </div>

              <div className="space-y-3">
                <div className="flex items-center justify-between">
                  <label className="text-sm font-medium text-slate-700">文字色</label>
                  <div className="flex items-center space-x-2">
                    <input type="text" value={textColor} onChange={(e) => setTextColor(e.target.value)} className="w-20 p-1 text-sm border border-slate-300 rounded font-mono uppercase text-center outline-none focus:border-blue-500" />
                    <input type="color" value={textColor} onChange={(e) => setTextColor(e.target.value)} className="w-7 h-7 p-0 border-0 rounded cursor-pointer" />
                  </div>
                </div>
                <div className="flex flex-wrap gap-2">
                  {PRESET_TEXTS.map(color => (
                    <button key={color} onClick={() => setTextColor(color)} className={`w-8 h-8 rounded-full border-2 transition-transform hover:scale-110 ${textColor === color ? 'border-blue-500 shadow-md' : 'border-slate-200'}`} style={{ backgroundColor: color }} title={color} />
                  ))}
                </div>
              </div>
            </section>

          </div>
        </div>

        <div className="flex-1 bg-slate-200/50 p-4 md:p-8 flex flex-col items-center justify-center overflow-auto relative">
          {!baseImage && (
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10">
              <div className="bg-white/80 backdrop-blur-sm px-6 py-3 rounded-full shadow-sm text-slate-500 font-medium flex items-center space-x-2 border border-slate-200">
                <ImageIcon className="w-5 h-5" />
                <span>左側のパネルから画像をアップロードしてください</span>
              </div>
            </div>
          )}

          <div className="relative shadow-2xl bg-white rounded-md overflow-hidden ring-1 ring-slate-900/5 transition-all" style={{ maxWidth: '100%', maxHeight: '100%', aspectRatio: `${canvasWidth} / ${canvasHeight}` }}>
            <canvas ref={canvasRef} width={canvasWidth} height={canvasHeight} className="w-full h-full object-contain" />
          </div>

          <p className="mt-6 text-sm text-slate-500 font-medium">書き出しサイズ: {canvasWidth} × {canvasHeight} px</p>
        </div>

        {showGallery && (
          <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex justify-center items-center p-4 md:p-8">
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-6xl h-full max-h-[90vh] flex flex-col overflow-hidden">
              <div className="flex items-center justify-between p-6 border-b border-slate-200 bg-slate-50 shrink-0">
                <div className="flex items-center space-x-3">
                  <div className="bg-blue-100 p-2.5 rounded-xl text-blue-600">
                    <Library className="w-6 h-6" />
                  </div>
                  <div>
                    <h2 className="text-xl font-bold text-slate-800">チーム保存Box（共有ギャラリー）</h2>
                    <p className="text-sm text-slate-500">チームで作成・共有された画像を閲覧・ダウンロードできます</p>
                  </div>
                </div>
                <button onClick={() => setShowGallery(false)} className="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-500">
                  <X className="w-6 h-6" />
                </button>
              </div>

              <div className="flex-1 overflow-y-auto p-6 bg-slate-100/50">
                {galleryImages.length === 0 ? (
                  <div className="h-full flex flex-col items-center justify-center text-slate-400 space-y-4">
                    <Library className="w-16 h-16 opacity-30" />
                    <p className="font-medium text-slate-500">まだ共有された画像はありません</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    {galleryImages.map(img => (
                      <div key={img.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group flex flex-col hover:shadow-md transition-shadow">
                        <div className="aspect-[4/3] bg-slate-200 relative overflow-hidden">
                          <img src={img.imageUrl} alt={img.titleText} className="w-full h-full object-cover" />
                          <div className="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center space-x-3">
                            <button onClick={() => downloadFromDataUrl(img.imageUrl, `shared_${img.createdAt}.jpg`)} className="bg-white/90 text-slate-800 hover:bg-white p-2.5 rounded-full shadow-lg transition-transform hover:scale-105" title="画像をダウンロード">
                              <Download className="w-5 h-5" />
                            </button>
                            <button onClick={() => handleDeleteFromGallery(img.id)} className="bg-white/90 text-red-600 hover:bg-red-50 p-2.5 rounded-full shadow-lg transition-transform hover:scale-105" title="ギャラリーから削除">
                              <Trash2 className="w-5 h-5" />
                            </button>
                          </div>
                        </div>
                        <div className="p-4 flex-1 flex flex-col justify-between">
                          <p className="text-sm font-bold text-slate-800 line-clamp-2 leading-snug mb-2">{img.titleText || '（タイトル未設定）'}</p>
                          <p className="text-xs text-slate-400 font-medium">{new Date(img.createdAt).toLocaleString('ja-JP')}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

// ==========================================
// 起動：合言葉チェック → アプリ表示
// ==========================================
function Root() {
  const [unlocked, setUnlocked] = useState(localStorage.getItem('meo_unlocked') === '1');
  if (!unlocked) {
    return <PassphraseGate onUnlock={() => setUnlocked(true)} />;
  }
  return <ThumbnailApp />;
}

createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
