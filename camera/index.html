<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>工事写真 黒板カメラ</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --green-deep:#0d2b1a;
    --green-mid:#1c4a2e;
    --green-bright:#2d7a4f;
    --yellow:#f0e050;
    --yellow-dim:rgba(240,224,80,0.75);
    --white:#fff;
    --gray-bg:#f0ede8;
    --gray-line:#e0dcd4;
    --text:#1a1a1a;
    --text-sub:#888;
    --radius:14px;
    --font:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;
  }
  html,body{height:100%;overflow-x:hidden;background:var(--gray-bg);font-family:var(--font);color:var(--text)}

  /* ===== CAMERA SECTION ===== */
  #cam-section{
    position:relative;width:100%;background:#000;
    aspect-ratio:3/4;max-height:62svh;overflow:hidden;
  }
  video{width:100%;height:100%;object-fit:cover;display:block}
  #ov{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

  /* 起動前 */
  #no-cam{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;
    background:linear-gradient(160deg,#0a1a10,#1c3a2a);
  }
  #no-cam svg{width:56px;height:56px;opacity:.5}
  #no-cam p{color:rgba(255,255,255,.5);font-size:14px;letter-spacing:.05em}
  #start-btn{
    padding:12px 32px;background:var(--yellow);color:var(--green-deep);
    border:none;border-radius:40px;font-size:15px;font-weight:700;
    cursor:pointer;letter-spacing:.05em;
  }

  /* カメラ起動後コントロール */
  #cam-bar{
    position:absolute;bottom:0;left:0;right:0;
    display:none;justify-content:space-between;align-items:center;
    padding:10px 16px 14px;
    background:linear-gradient(transparent,rgba(0,0,0,.55));
  }
  .cam-btn{
    background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);
    color:#fff;border-radius:24px;padding:7px 16px;
    font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;
    backdrop-filter:blur(4px);
  }
  .cam-btn.off{opacity:.45}
  #switch-btn{
    width:40px;height:40px;border-radius:50%;padding:0;justify-content:center;
  }

  /* ===== FORM SECTION ===== */
  #form-section{
    background:#fff;margin:0;
    border-top:0.5px solid var(--gray-line);
  }
  .field{
    display:flex;align-items:center;
    padding:11px 16px;border-bottom:0.5px solid var(--gray-line);gap:12px;
  }
  .field:last-child{border-bottom:none}
  .field label{
    font-size:11px;color:var(--text-sub);min-width:58px;flex-shrink:0;
    letter-spacing:.03em;
  }
  .field input{
    flex:1;border:none;outline:none;font-size:15px;
    color:var(--text);background:transparent;min-width:0;
    font-family:var(--font);
  }
  .field input::placeholder{color:#ccc}
  .field input[type=date]{color:var(--text)}

  /* 設定行 */
  #settings{
    background:#fff;margin-top:8px;
    border-top:0.5px solid var(--gray-line);
    border-bottom:0.5px solid var(--gray-line);
  }
  .setting-row{
    display:flex;align-items:center;padding:10px 16px;
    border-bottom:0.5px solid var(--gray-line);gap:12px;
  }
  .setting-row:last-child{border-bottom:none}
  .setting-row label{font-size:11px;color:var(--text-sub);min-width:58px}
  .setting-row select{
    flex:1;border:none;outline:none;font-size:15px;
    color:var(--text);background:transparent;font-family:var(--font);
  }
  .setting-row input[type=range]{flex:1;accent-color:var(--green-bright)}
  .setting-row span{font-size:13px;color:var(--text-sub);min-width:36px;text-align:right}

  /* ===== SHOT BUTTON ===== */
  #shot-area{padding:16px;background:var(--gray-bg)}
  #shot-btn{
    width:100%;padding:17px;
    background:var(--green-deep);color:var(--yellow);
    border:none;border-radius:var(--radius);
    font-size:17px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    letter-spacing:.08em;
    box-shadow:0 4px 20px rgba(13,43,26,.25);
    transition:transform .1s,box-shadow .1s;
  }
  #shot-btn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(13,43,26,.2)}
  #shot-btn svg{width:22px;height:22px;stroke:var(--yellow);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* ===== PREVIEW ===== */
  #preview-section{
    display:none;flex-direction:column;gap:12px;
    padding:16px;background:var(--gray-bg);min-height:100svh;
  }
  #preview-section h2{
    font-size:13px;color:var(--text-sub);font-weight:400;letter-spacing:.05em;
    text-align:center;
  }
  #preview-img{width:100%;border-radius:var(--radius);display:block;box-shadow:0 4px 24px rgba(0,0,0,.12)}
  #dl-btn{
    display:block;text-align:center;padding:16px;
    background:var(--green-deep);color:var(--yellow);
    border-radius:var(--radius);font-size:16px;font-weight:700;
    text-decoration:none;letter-spacing:.06em;
  }
  #retake-btn{
    display:block;text-align:center;padding:14px;
    background:#fff;border:0.5px solid var(--gray-line);
    border-radius:var(--radius);font-size:15px;color:var(--text);cursor:pointer;
  }

  /* iOS safari 下部セーフエリア */
  #shot-area,#preview-section{padding-bottom:max(16px,env(safe-area-inset-bottom))}
</style>
</head>
<body>

<!-- カメラ -->
<div id="cam-section">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="ov"></canvas>
  <div id="no-cam">
    <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
    </svg>
    <p>カメラを起動して撮影を開始</p>
    <button id="start-btn">カメラ起動</button>
  </div>
  <div id="cam-bar">
    <button class="cam-btn" id="toggle-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      黒板 ON
    </button>
    <button class="cam-btn" id="switch-btn" title="カメラ切替">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7H4"/><path d="m4 7 3-3M4 7l3 3"/><path d="M4 17h16"/><path d="m16 14 3 3-3 3"/></svg>
    </button>
  </div>
</div>

<!-- 入力フォーム -->
<div id="form-section">
  <div class="field">
    <label>工事件名</label>
    <input id="f-name" type="text" placeholder="例：○○太陽光発電設備保守工事" autocomplete="off">
  </div>
  <div class="field">
    <label>工事場所</label>
    <input id="f-place" type="text" placeholder="例：宮崎県○○市" autocomplete="off">
  </div>
  <div class="field">
    <label>撮影内容</label>
    <input id="f-content" type="text" placeholder="例：パネル洗浄作業" autocomplete="off">
  </div>
  <div class="field">
    <label>日　　付</label>
    <input id="f-date" type="date">
  </div>
</div>

<!-- 設定 -->
<div id="settings">
  <div class="setting-row">
    <label>黒板位置</label>
    <select id="pos-sel">
      <option value="br">右下</option>
      <option value="bl">左下</option>
      <option value="tr">右上</option>
      <option value="tl">左上</option>
    </select>
  </div>
  <div class="setting-row">
    <label>黒板サイズ</label>
    <input type="range" id="size-sl" min="25" max="55" value="40" step="1">
    <span id="size-val">40%</span>
  </div>
  <div class="setting-row">
    <label>透明度</label>
    <input type="range" id="op-sl" min="30" max="100" value="82" step="2">
    <span id="op-val">82%</span>
  </div>
</div>

<!-- 撮影ボタン -->
<div id="shot-area">
  <button id="shot-btn">
    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    撮　影
  </button>
</div>

<!-- プレビュー -->
<div id="preview-section">
  <h2>撮影完了 — 画像を保存してください</h2>
  <img id="preview-img" alt="撮影プレビュー">
  <a id="dl-btn">⬇ 画像を保存する</a>
  <button id="retake-btn">← 撮り直す</button>
</div>

<script>
(function(){
  const vid=document.getElementById('vid');
  const ov=document.getElementById('ov');
  const ctx=ov.getContext('2d');
  let stream=null, showBoard=true, facingMode='environment', animFrame=null;

  // 今日の日付
  const today=new Date();
  document.getElementById('f-date').value=today.toISOString().split('T')[0];

  // スライダー表示
  document.getElementById('size-sl').addEventListener('input',e=>{
    document.getElementById('size-val').textContent=e.target.value+'%';
  });
  document.getElementById('op-sl').addEventListener('input',e=>{
    document.getElementById('op-val').textContent=e.target.value+'%';
  });

  // カメラ起動
  async function startCam(){
    try{
      if(stream) stream.getTracks().forEach(t=>t.stop());
      stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode, width:{ideal:3024}, height:{ideal:4032}}
      });
      vid.srcObject=stream;
      document.getElementById('no-cam').style.display='none';
      document.getElementById('cam-bar').style.display='flex';
      vid.addEventListener('loadedmetadata',startDraw,{once:true});
    }catch(err){
      const nc=document.getElementById('no-cam');
      nc.innerHTML='<p style="color:rgba(255,100,100,.8);font-size:14px;text-align:center;padding:0 32px">カメラへのアクセスが許可されていません。<br>ブラウザの設定からカメラを許可してください。</p>';
    }
  }

  document.getElementById('start-btn').addEventListener('click',startCam);

  document.getElementById('switch-btn').addEventListener('click',()=>{
    facingMode=facingMode==='environment'?'user':'environment';
    startCam();
  });

  const toggleBtn=document.getElementById('toggle-btn');
  toggleBtn.addEventListener('click',()=>{
    showBoard=!showBoard;
    toggleBtn.innerHTML=showBoard
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> 黒板 ON'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> 黒板 OFF';
    toggleBtn.classList.toggle('off',!showBoard);
  });

  function getVals(){
    const d=document.getElementById('f-date').value;
    let dStr='';
    if(d){
      const dt=new Date(d+'T00:00:00');
      dStr=`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
    }
    return{
      name:document.getElementById('f-name').value,
      place:document.getElementById('f-place').value,
      content:document.getElementById('f-content').value,
      date:dStr,
      opacity:parseInt(document.getElementById('op-sl').value)/100,
      size:parseInt(document.getElementById('size-sl').value)/100,
      pos:document.getElementById('pos-sel').value,
    };
  }

  function drawBoard(c, W, H, v, finalRender){
    const bw=Math.round(W*v.size);
    const rows=[
      {label:'工事件名', value:v.name},
      {label:'工事場所', value:v.place},
      {label:'撮影内容', value:v.content},
      {label:'日　　付', value:v.date},
    ];
    const fs=Math.max(11, Math.round(bw*0.052));
    const rowH=Math.round(fs*2.0);
    const titleH=Math.round(rowH*1.2);
    const bh=titleH + rows.length*rowH + 3;
    const pad=Math.round(W*0.022);
    const pos=v.pos;
    let bx,by;
    if(pos==='br'){bx=W-bw-pad; by=H-bh-pad;}
    else if(pos==='bl'){bx=pad; by=H-bh-pad;}
    else if(pos==='tr'){bx=W-bw-pad; by=pad;}
    else{bx=pad; by=pad;}

    const alpha=finalRender?1:v.opacity;
    c.save();
    c.globalAlpha=alpha;

    // 黒板本体
    c.fillStyle='#163320';
    c.strokeStyle='#c8b432';
    c.lineWidth=Math.max(2, Math.round(bw*0.009));
    roundRect(c,bx,by,bw,bh,4);
    c.fill();c.stroke();

    // タイトル帯
    c.globalAlpha=alpha;
    c.fillStyle='#d4bc28';
    roundRect(c,bx,by,bw,titleH,4);
    c.fill();

    // タイトル文字
    c.fillStyle='#0d2010';
    c.font=`bold ${Math.round(fs*1.05)}px 'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif`;
    c.textAlign='center';
    c.textBaseline='middle';
    c.fillText('工　事　写　真', bx+bw/2, by+titleH/2);

    // 行
    const labelW=Math.round(bw*0.34);
    const lw=Math.max(0.5, Math.round(bw*0.003));
    rows.forEach((r,i)=>{
      const ry=by+titleH+i*rowH;
      const mid=ry+rowH/2;

      // 横線
      c.strokeStyle='rgba(200,180,50,0.55)';
      c.lineWidth=lw;
      c.beginPath();c.moveTo(bx,ry);c.lineTo(bx+bw,ry);c.stroke();

      // 縦線（ラベルと値の区切り）
      c.beginPath();c.moveTo(bx+labelW,ry);c.lineTo(bx+labelW,ry+rowH);c.stroke();

      // ラベル
      c.fillStyle='rgba(230,210,70,0.88)';
      c.font=`${fs}px 'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif`;
      c.textAlign='center';
      c.textBaseline='middle';
      c.fillText(r.label, bx+labelW/2, mid);

      // 値（長い場合は省略）
      c.fillStyle='#ffffff';
      c.textAlign='left';
      const maxW=bw-labelW-8;
      let val=r.value||'';
      if(c.measureText(val).width>maxW){
        while(val.length>0 && c.measureText(val+'…').width>maxW){
          val=val.slice(0,-1);
        }
        val=val+'…';
      }
      c.fillText(val, bx+labelW+6, mid);
    });

    c.restore();
  }

  function roundRect(c,x,y,w,h,r){
    c.beginPath();
    c.moveTo(x+r,y);
    c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
    c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
    c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
    c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);
    c.closePath();
  }

  function startDraw(){
    if(animFrame) cancelAnimationFrame(animFrame);
    function loop(){
      const W=vid.videoWidth, H=vid.videoHeight;
      if(W&&H){
        ov.width=W; ov.height=H;
        ctx.clearRect(0,0,W,H);
        if(showBoard) drawBoard(ctx,W,H,getVals(),false);
      }
      animFrame=requestAnimationFrame(loop);
    }
    loop();
  }

  // 撮影
  document.getElementById('shot-btn').addEventListener('click',()=>{
    if(!stream){alert('先にカメラを起動してください');return;}
    const W=vid.videoWidth||1080, H=vid.videoHeight||1440;
    const sc=document.createElement('canvas');
    sc.width=W; sc.height=H;
    const sctx=sc.getContext('2d');
    sctx.drawImage(vid,0,0,W,H);
    if(showBoard) drawBoard(sctx,W,H,getVals(),true);

    const url=sc.toDataURL('image/jpeg',0.93);
    document.getElementById('preview-img').src=url;

    const ps=document.getElementById('preview-section');
    ps.style.display='flex';
    document.getElementById('shot-area').style.display='none';

    const dl=document.getElementById('dl-btn');
    dl.href=url;
    const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,16);
    const nm=(document.getElementById('f-name').value||'工事写真').replace(/\s/g,'_');
    dl.download=`${nm}_${ts}.jpg`;

    ps.scrollIntoView({behavior:'smooth'});
  });

  // 撮り直し
  document.getElementById('retake-btn').addEventListener('click',()=>{
    document.getElementById('preview-section').style.display='none';
    document.getElementById('shot-area').style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  });

})();
</script>
</body>
</html>
