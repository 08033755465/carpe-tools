<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ツール一覧</title>
<style>
  :root{--bg:#f4f6f8;--card:#fff;--ink:#1f2933;--sub:#66727f;--line:#e2e8f0;--accent:#1e5299;--accent-d:#163d75;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.6;padding-bottom:40px;}
  header{background:var(--accent);color:#fff;padding:18px 16px;}
  header h1{margin:0;font-size:19px;font-weight:700;}
  header p{margin:3px 0 0;font-size:12px;opacity:.9;}
  .wrap{padding:16px;max-width:620px;margin:0 auto;}
  a.tool{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;text-decoration:none;color:var(--ink);}
  a.tool:active{background:#eaf1fa;}
  .ico{font-size:26px;flex:0 0 auto;}
  .ttl{flex:1;font-size:16px;font-weight:700;}
  .arr{color:var(--sub);font-size:18px;}
</style>
</head>
<body>
<header>
  <h1>ツール一覧</h1>
  <p>使いたいツールを選んでください</p>
</header>
<div class="wrap">
  <a class="tool" href="thumbnail/"><span class="ico">🖼️</span><span class="ttl">サムネイル合成ツール</span><span class="arr">›</span></a>
  <a class="tool" href="kintai/"><span class="ico">📝</span><span class="ttl">勤怠・日報ツール</span><span class="arr">›</span></a>
  <a class="tool" href="rakuten/"><span class="ico">🛒</span><span class="ttl">楽天買いだめ・在庫管理</span><span class="arr">›</span></a>
  <a class="tool" href="portal/"><span class="ico">🏢</span><span class="ttl">カルペ社員ポータル</span><span class="arr">›</span></a>
  <a class="tool" href="checklist/"><span class="ico">✅</span><span class="ttl">作業項目チェックリスト作成</span><span class="arr">›</span></a>
  <a class="tool" href="menu/"><span class="ico">💇</span><span class="ttl">サービスメニュー</span><span class="arr">›</span></a>
  <a class="tool" href="calendar/"><span class="ico">📅</span><span class="ttl">2026 カレンダー</span><span class="arr">›</span></a>
  <a class="tool" href="camera/"><span class="ico">📷</span><span class="ttl">黒板カメラ</span><span class="arr">›</span></a>
</div>
</body>
</html>
